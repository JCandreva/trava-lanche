<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculos da pessoa</title>
    <link rel="stylesheet" href="/styles.css">
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const consultaMacrosForm = document.getElementById('consulta-macros-form');
            const consultaMacrosResult = document.getElementById('consulta-macros-result');
            const consultaSuperavitForm = document.getElementById('consulta-superavit-form');
            const consultaSuperavitResult = document.getElementById('consulta-superavit-result');
            const nuncaComeuForm = document.getElementById('nunca-comeu-form');
            const nuncaComeuResult = document.getElementById('nunca-comeu-result');
            

            // Fetch pessoas to populate the select options
            fetch('/api/pessoas')
                .then(response => response.json())
                .then(pessoas => {
                    const pessoaSelectMacros = consultaMacrosForm.querySelector('select[name="nome_pessoa"]');
                    const pessoaSelectSuperavit = consultaSuperavitForm.querySelector('select[name="nome_pessoa"]');
                    const pessoaSelectNuncaComeu = nuncaComeuForm.querySelector('select[name="nome_pessoa"]');
                    pessoas.forEach(pessoa => {
                        const option = document.createElement('option');
                        option.value = pessoa.nome;
                        option.textContent = pessoa.nome;
                        pessoaSelectMacros.appendChild(option.cloneNode(true));
                        pessoaSelectSuperavit.appendChild(option);
                        pessoaSelectNuncaComeu.appendChild(option.cloneNode(true));
                    });
                });

            consultaMacrosForm.addEventListener('submit', function(event) {
                event.preventDefault();
                const formData = new FormData(this);
                const nome_pessoa = formData.get('nome_pessoa');
                const data = formData.get('data');

                fetch(`/api/consulta_macros?nome_pessoa=${encodeURIComponent(nome_pessoa)}&data=${encodeURIComponent(data)}`)
                    .then(response => response.json())
                    .then(result => {
                        if (result.error) {
                            consultaMacrosResult.innerHTML = `<p style="color: red;">${result.error}</p>`;
                        } else {
                            if (result.length === 0) {
                                consultaMacrosResult.innerHTML = `<p>Nenhum registro encontrado para ${nome_pessoa} em ${data}.</p>`;
                                return;
                            }
                            consultaMacrosResult.innerHTML = `
                                <h3>Resultados para ${nome_pessoa} em ${data}:</h3>
                                <ul>
                                    <li>Calorias: ${result[0].total_calorias}</li>
                                    <li>Proteínas: ${result[0].total_proteinas}</li>
                                    <li>Carboidratos: ${result[0].total_carboidratos}</li>
                                    <li>Gorduras: ${result[0].total_gorduras}</li>
                                </ul>
                            `;
                        }
                    });
            });

            consultaSuperavitForm.addEventListener('submit', function(event) {
                event.preventDefault();
                const formData = new FormData(this);
                const nome_pessoa = formData.get('nome_pessoa');
                const data = formData.get('data');

                fetch(`/api/consulta_superavit?nome_pessoa=${encodeURIComponent(nome_pessoa)}&data=${encodeURIComponent(data)}`)
                    .then(response => response.json())
                    .then(result => {
                        if (result.error) {
                            consultaSuperavitResult.innerHTML = `<p style="color: red;">${result.error}</p>`;
                        } else {
                            if (result.length === 0) {
                                consultaSuperavitResult.innerHTML = `<p>Nenhum registro encontrado para ${nome_pessoa} em ${data}.</p>`;
                                return;
                            }
                            consultaSuperavitResult.innerHTML = `
                                <h3>${nome_pessoa} estava com um ${result[0].superavit_calorias > 0 ? 'superavit' : 'deficit'} de ${Math.abs(result[0].superavit_calorias)}kcal em ${data}:</h3>`;
                        }
                    });
            });

            nuncaComeuForm.addEventListener('submit', function(event) {
                event.preventDefault();
                const formData = new FormData(this);
                const nome_pessoa = formData.get('nome_pessoa');

                fetch(`/api/produtos_nunca_comeu?nome_pessoa=${encodeURIComponent(nome_pessoa)}`)
                    .then(response => response.json())
                    .then(result => {
                        if (result.error) {
                            nuncaComeuResult.innerHTML = `<p style="color: red;">${result.error}</p>`;
                            return;
                        }

                        if (result.length === 0) {
                            nuncaComeuResult.innerHTML = `<p>${nome_pessoa} já consumiu todos os produtos cadastrados.</p>`;
                            return;
                        }

                        nuncaComeuResult.innerHTML = `
                            <h3>Produtos que ${nome_pessoa} nunca comeu</h3>
                            <ul>
                                ${result.map(produto => `<li>${produto.nome}</li>`).join('')}
                            </ul>
                        `;
                    });
            });
        });
    </script>
</head>
<body class="page-calc">
    <nav>
        <a href="/">Home</a> |
        <a href="/alimentacao/">Alimentações</a>
    </nav>

    <main class="calc-shell">
        <section class="calc-hero">
            <p class="eyebrow">Cálculos</p>
            <h1>Macros e superávit por pessoa</h1>
            <p>
                Consulte o consumo diário e veja o superávit calórico estimado com uma interface mais limpa e focada.
            </p>
        </section>

        <section class="calc-grid">
            <article class="calc-card">
                <h2>Consulta macros do dia</h2>
                <form id="consulta-macros-form">
                    <select name="nome_pessoa" required>
                        <option value="">Selecione uma pessoa</option>
                        <!-- Opções de pessoas serão carregadas aqui -->
                    </select>
                    <input type="date" name="data" required />
                    <button type="submit">Consultar</button>
                </form>
                <div id="consulta-macros-result" class="calc-result"></div>
            </article>

            <article class="calc-card calc-card-accent">
                <h2>Consulta superávit</h2>
                <form id="consulta-superavit-form">
                    <select name="nome_pessoa" required>
                        <option value="">Selecione uma pessoa</option>
                        <!-- Opções de pessoas serão carregadas aqui -->
                    </select>
                    <input type="date" name="data" required />
                    <button type="submit">Consultar</button>
                </form>
                <div id="consulta-superavit-result" class="calc-result"></div>
            </article>

            <article class="calc-card calc-card-wide">
                <h2>Produtos que a pessoa nunca comeu</h2>
                <form id="nunca-comeu-form" class="compact-form">
                    <select name="nome_pessoa" required>
                        <option value="">Selecione uma pessoa</option>
                        <!-- Opções de pessoas serão carregadas aqui -->
                    </select>
                    <button type="submit">Consultar</button>
                </form>
                <div id="nunca-comeu-result" class="calc-result"></div>
            </article>
        </section>
    </main>
</body>
</html>
