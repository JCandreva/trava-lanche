<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="/styles.css">
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const produtosTableBody = document.getElementById('produtos-table-body');
            const pessoasTableBody = document.getElementById('pessoas-table-body');
            const addProductForm = document.getElementById('add-product-form');
            const addPersonForm = document.getElementById('add-person-form');
            const deleteProductForm = document.getElementById('delete-product-form');
            const deletePersonForm = document.getElementById('delete-person-form');
            const searchProductInput = document.getElementById('search-produto-input');
            const searchProductButton = document.getElementById('search-produto-button');
            const searchProductResult = document.getElementById('search-produto-result');

            // Fetch products from the API and populate the table
            fetch('/api/produtos')
                .then(response => response.json())
                .then(products => {
                    products.forEach(product => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${product.nome}</td>
                            <td>${product.calorias}</td>
                            <td>${product.proteinas}</td>
                            <td>${product.carboidratos}</td>
                            <td>${product.gorduras}</td>
                        `;
                        produtosTableBody.appendChild(row);
                    });
                });

            fetch('/api/pessoas')
                .then(response => response.json())
                .then(people => {
                    people.forEach(person => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${person.nome}</td>
                            <td>${person.peso}</td>
                            <td>${person.idade}</td>
                            <td>${person.altura}</td>
                        `;
                        pessoasTableBody.appendChild(row);
                    });
                });

            addProductForm.addEventListener('submit', function(event) {
                event.preventDefault();
                const formData = new FormData(this);

                fetch('/api/produtos', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.text())
                .then(message => {
                    alert(message);
                    location.reload();
                });
            });

            addPersonForm.addEventListener('submit', function(event) {
                event.preventDefault();
                const formData = new FormData(this);

                fetch('/api/pessoas', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.text())
                .then(message => {
                    alert(message);
                    location.reload();
                });
            });

            deleteProductForm.addEventListener('submit', function(event) {
                event.preventDefault();
                const formData = new FormData(this);
                const nome = formData.get('nome').trim();

                fetch(`/api/produtos/${encodeURIComponent(nome)}`, {
                    method: 'DELETE'
                })
                .then(response => response.text())
                .then(message => {
                    alert(message);
                    location.reload();
                });
            });

            deletePersonForm.addEventListener('submit', function(event) {
                event.preventDefault();
                const formData = new FormData(this);
                const nome = formData.get('nome').trim();

                fetch(`/api/pessoas/${encodeURIComponent(nome)}`, {
                    method: 'DELETE'
                })
                .then(response => response.text())
                .then(message => {
                    alert(message);
                    location.reload();
                });
            });

            searchProductButton.addEventListener('click', function() {
                const productName = searchProductInput.value.trim();
                if (productName) {
                    fetch(`/api/produtos/${encodeURIComponent(productName)}`)
                        .then(response => response.json())
                        .then(product => {
                            if (product.length > 0) {
                                product.forEach(p => {
                                    const row = document.createElement('div');
                                    row.innerHTML = `
                                        <p>Nome: ${p.nome}</p>
                                        <p>Calorias: ${p.calorias}</p>
                                        <p>Proteínas: ${p.proteinas}</p>
                                        <p>Carboidratos: ${p.carboidratos}</p>
                                        <p>Gorduras: ${p.gorduras}</p>
                                    `;
                                    searchProductResult.appendChild(row);
                                });
                            } else {
                                searchProductResult.textContent = 'Produto não encontrado.';
                            }
                        });
                }
            });
        });
    </script>
</head>
<body>
    <nav>
        <a href="/alimentacao">Alimentação</a> |
        <a href="/calculos">Cálculos</a>
    </nav>
    <main>
        <div>
            <h3>Produtos</h3>
            <table>
                <thead>
                    <tr>
                        <th>Nome do Produto</th>
                        <th>Calorias</th>
                        <th>Proteínas</th>
                        <th>Carboidratos</th>
                        <th>Gorduras</th>
                    </tr>
                </thead>
                <tbody id="produtos-table-body">
                    <!-- Os produtos serão inseridos aqui -->
                </tbody>
            </table>
            <h3>Adicionar produto</h3>
            <form id="add-product-form" action="/api/produtos" method="POST">
                <input type="text" name="nome" placeholder="Nome do Produto" required />
                <input type="number" name="calorias" placeholder="Calorias" required />
                <input type="number" name="proteinas" placeholder="Proteínas" required />
                <input type="number" name="gorduras" placeholder="Gorduras" required />
                <input type="number" name="carboidratos" placeholder="Carboidratos" required />
                <button type="submit">Adicionar Produto</button>
            </form>
            <h3>Excluir produto</h3>
            <form id="delete-product-form">
                <input type="text" name="nome" placeholder="Nome do Produto" required />
                <button type="submit">Excluir Produto</button>
            </form>
        </div>

        <div>
            <h3>Pessoas</h3>
            <table>
                <thead>
                    <tr>
                        <th>Nome da Pessoa</th>
                        <th>Peso</th>
                        <th>Idade</th>
                        <th>Altura</th>
                    </tr>
                </thead>
                <tbody id="pessoas-table-body">
                    <!-- As pessoas serão inseridas aqui -->
                </tbody>
            </table>
            <h3>Adicionar pessoa</h3>
            <form id="add-person-form" action="/api/pessoas" method="POST">
                <input type="text" name="nome" placeholder="Nome da Pessoa" required />
                <input type="number" name="peso" placeholder="Peso(kg)" required />
                <input type="number" name="idade" placeholder="Idade" required />
                <input type="number" name="altura" placeholder="Altura(cm)" required />
                <button type="submit">Adicionar Pessoa</button>
            </form>
            <h3>Excluir pessoa</h3>
            <form id="delete-person-form">
                <input type="text" name="nome" placeholder="Nome da Pessoa" required />
                <button type="submit">Excluir Pessoa</button>
            </form>
        </div>

        <div id="search-produto">
            <h3>Buscar Produto</h3>
            <input type="text" id="search-produto-input" placeholder="Nome do Produto" />
            <button id="search-produto-button">Buscar</button>
            <div id="search-produto-result"></div>
        </div>
    </main>
</body>
</html>
