<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const produtosTableBody = document.getElementById('produtos-table-body');
            const pessoasTableBody = document.getElementById('pessoas-table-body');
            const addProductForm = document.getElementById('add-product-form');
            const addPersonForm = document.getElementById('add-person-form');

            // Fetch products from the API and populate the table
            fetch('/api/produtos')
                .then(response => response.json())
                .then(products => {
                    products.forEach(product => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${product.nome}</td>
                            <td>${product.calorias}</td>
                            <td>${product.proteinas}</td>
                            <td>${product.carboidratos}</td>
                            <td>${product.gorduras}</td>
                        `;
                        produtosTableBody.appendChild(row);
                    });
                });

            fetch('/api/pessoas')
                .then(response => response.json())
                .then(people => {
                    people.forEach(person => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${person.nome}</td>
                            <td>${person.peso}</td>
                        `;
                        pessoasTableBody.appendChild(row);
                    });
                });

            addProductForm.addEventListener('submit', function(event) {
                event.preventDefault();
                const formData = new FormData(this);

                fetch('/api/produtos', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.text())
                .then(message => {
                    alert(message);
                    location.reload();
                });
            });

            addPersonForm.addEventListener('submit', function(event) {
                event.preventDefault();
                const formData = new FormData(this);

                fetch('/api/pessoas', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.text())
                .then(message => {
                    alert(message);
                    location.reload();
                });
            });
        });
    </script>
</head>
<body>
    <div>
    Produtos:
    <table>
        <thead>
            <tr>
                <th>Nome do Produto</th>
                <th>Calorias</th>
                <th>Proteínas</th>
                <th>Carboidratos</th>
                <th>Gorduras</th>
            </tr>
        </thead>
        <tbody id="produtos-table-body">
            <!-- Os produtos serão inseridos aqui -->
        </tbody>
    </table>
    Adicionar produto:
    <form id="add-product-form" action="/api/produtos" method="POST">
        <input type="text" name="nome" placeholder="Nome do Produto" required />
        <input type="number" name="calorias" placeholder="Calorias" required />
        <input type="number" name="proteinas" placeholder="Proteínas" required />
        <input type="number" name="gorduras" placeholder="Gorduras" required />
        <input type="number" name="carboidratos" placeholder="Carboidratos" required />
        <button type="submit">Adicionar Produto</button>
    </form>
</div>
<div>
    Pessoas:
    <table>
        <thead>
            <tr>
                <th>Nome da Pessoa</th>
                <th>Peso</th>
            </tr>
        </thead>
        <tbody id="pessoas-table-body">
            <!-- As pessoas serão inseridas aqui -->
        </tbody>
    </table>
    Adicionar pessoa:
    <form id="add-person-form" action="/api/pessoas" method="POST">
        <input type="text" name="nome" placeholder="Nome da Pessoa" required />
        <input type="number" name="peso" placeholder="Peso" required />
        <button type="submit">Adicionar Pessoa</button>
    </form>
</div>
</body>
</html>
